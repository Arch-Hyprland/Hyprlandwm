# Legacy applicationMenu:blur rules (keeping for compatibility)
layerrule {
  name = dms
  match:namespace = ^(dms:.*)$
  blur = on
  ignore_alpha = 0.2
}

layerrule {
  name = cider
  match:namespace= cider
  ignore_alpha= 0
  blur= on
}

layerrule {
  name=nautilus
  match:namespace= nautilus
  blur = on
  ignore_alpha = 0.2
}

# OSD (On-Screen Display) blur rules
layerrule {
  name = quickshell  
  match:namespace= ^(quickshell:.*)$
  blur = on
  ignore_alpha = 0.2
}
